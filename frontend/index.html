<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coleta de Dados Pessoais</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
  </head>

  <body class="hold-transition login-page">
    <div class="login-box" style="width: 500px">
      <div class="card card-outline card-primary">
        <div class="card-header text-center">
          <a href="#" class="h1"><b>Sistema</b>Censo</a>
        </div>

        <div class="card-body">
          <p class="login-box-msg">
            Insira seus dados pessoais para prosseguir
          </p>

          <form id="formDadosPessoais">
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                id="nome"
                placeholder="Nome Completo"
                required
              />

              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-user"></span>
                </div>
              </div>
            </div>

            <div class="input-group mb-3">
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="E-mail"
                required
              />

              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-envelope"></span>
                </div>
              </div>
            </div>

            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                id="celular"
                placeholder="Celular"
              />

              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-phone"></span>
                </div>
              </div>
            </div>

            <div class="input-group mb-3">
              <input type="date" class="form-control" id="data_nascimento" />

              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-calendar"></span>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-6">
                <button
                  type="button"
                  id="btnSalvar"
                  class="btn btn-success btn-block"
                >
                  Salvar
                </button>
              </div>

              <div class="col-6">
                <button
                  type="button"
                  id="btnContinuar"
                  class="btn btn-primary btn-block"
                >
                  Continuar
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      let matriculaGerada = null;

      // =========================
      // BOTÃO SALVAR
      // =========================

      document
        .getElementById("btnSalvar")
        .addEventListener("click", function () {
          const payload = {
            nome: document.getElementById("nome").value,
            email: document.getElementById("email").value,
            celular: document.getElementById("celular").value,
            data_nascimento: document.getElementById("data_nascimento").value,
          };

          fetch("http://localhost/Trabalho_DAD/api/index.php", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify(payload),
          })
            .then((response) => response.json())

            .then((data) => {
              if (data.matricula) {
                matriculaGerada = data.matricula;

                alert(
                  "Dados salvos com sucesso!\nMatrícula: " + matriculaGerada
                );
              } else {
                alert("Erro: " + data.mensagem);
              }
            })

            .catch((error) => {
              console.error(error);

              alert("Erro ao salvar.");
            });
        });

      // =========================
      // BOTÃO CONTINUAR
      // =========================

      document
        .getElementById("btnContinuar")
        .addEventListener("click", function () {
          if (!matriculaGerada) {
            alert("Salve os dados primeiro.");

            return;
          }

          const payload = {
            matricula: matriculaGerada,

            nome: document.getElementById("nome").value,
          };

          fetch("http://192.168.0.100:3333/", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify(payload),
          })
            .then((response) => response.json())

            .then((data) => {
              alert(data.mensagem);
            })

            .catch((error) => {
              console.error(error);

              alert("Erro ao enviar para o próximo grupo.");
            });
        });
    </script>
  </body>
</html>
